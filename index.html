<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDK GROUP — CRM Afiliados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { syne: ['Syne','sans-serif'], dm: ['DM Sans','sans-serif'] },
                    colors: {
                        lime: { 400: '#e8ff47', 500: '#c8e000' },
                        dark: { 900: '#0a0a0a', 800: '#111111', 700: '#181818', 600: '#222222' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #f0f0f0; }
        .font-syne { font-family: 'Syne', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .progress-bar { transition: width 1.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-dark-800 border border-white/10 rounded-2xl p-8 fade-in relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-lime-400 to-transparent"></div>
            <div class="font-syne text-lime-400 text-xs tracking-widest uppercase mb-6 text-center">RDK GROUP</div>
            <h1 class="font-syne text-2xl font-extrabold mb-1 text-center">CRM Afiliados</h1>
            <p class="text-white/40 text-sm mb-8 text-center">Entre com suas credenciais</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-white/40 uppercase tracking-widest block mb-2">E-mail</label>
                    <input id="l-email" type="email" placeholder="seu@email.com" class="w-full bg-dark-700 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-lime-400">
                </div>
                <div>
                    <label class="text-[10px] text-white/40 uppercase tracking-widest block mb-2">Senha</label>
                    <input id="l-pass" type="password" placeholder="••••••••" class="w-full bg-dark-700 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-lime-400">
                </div>
            </div>
            
            <button onclick="handleLogin()" id="btn-login" class="w-full mt-6 bg-lime-400 text-dark-900 font-syne font-bold rounded-xl py-3 text-sm tracking-wide hover:bg-lime-500 transition-all active:scale-95">
                Entrar no sistema
            </button>
            <p id="l-error" class="text-red-400 text-xs text-center mt-4 hidden"></p>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col">
        <nav class="sticky top-0 z-50 bg-dark-800 border-b border-white/8 px-6 h-16 flex items-center justify-between">
            <div class="font-syne font-bold text-lime-400 text-sm tracking-widest uppercase flex items-center gap-2">
                <span class="w-2 h-2 bg-lime-400 rounded-full animate-pulse"></span>RDK Dashboard
            </div>
            <div class="flex items-center gap-4">
                <button id="btn-sync" onclick="loadData()" class="text-xs font-syne font-bold bg-white/5 border border-white/10 px-4 py-2 rounded-lg hover:bg-lime-400 hover:text-dark-900 transition-all">
                    Sincronizar Dados
                </button>
                <button onclick="logout()" class="text-xs text-white/40 hover:text-red-400 transition-colors">Sair</button>
            </div>
        </nav>

        <main class="p-6 max-w-5xl mx-auto w-full space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-dark-800 border border-white/5 p-6 rounded-2xl">
                    <p class="text-[10px] text-white/40 uppercase tracking-widest mb-2">Faturamento Geral</p>
                    <h2 id="fat-
