    <script>
        tailwind.config = {

    <style>

        .font-syne { font-family: 'Syne', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .progress-bar { transition: width 1.5s ease-in-out; }
    </style>

<body class="min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-dark-800 border border-white/10 rounded-2xl p-8 fade-in relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-lime-400 to-transparent"></div>
            <div class="font-syne text-lime-400 text-xs tracking-widest uppercase mb-6">RDK GROUP</div>
            <h1 class="font-syne text-2xl font-extrabold mb-1">CRM Afiliados</h1>
            <p class="text-white/40 text-sm mb-8">Acesso restrito à equipe</p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-white/40 uppercase tracking-widest block mb-2">E-mail</label>
                    <input id="l-email" type="email" placeholder="seu@email.com" class="w-full bg-dark-700 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-lime-400 transition-all">
                </div>
                <div>
                    <label class="text-[10px] text-white/40 uppercase tracking-widest block mb-2">Senha</label>
                    <input id="l-pass" type="password" placeholder="••••••••" class="w-full bg-dark-700 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-lime-400 transition-all">
                </div>
            </div>
            <button onclick="doLogin()" class="w-full mt-6 bg-lime-400 text-dark-900 font-syne font-bold rounded-xl py-3 text-sm tracking-wide hover:bg-lime-500 transition-all active:scale-95">Entrar no sistema</button>
            <p id="l-error" class="text-red-400 text-xs text-center mt-4 hidden"></p>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col">
        <nav class="sticky top-0 z-50 bg-dark-800 border-b border-white/8 px-6 h-16 flex items-center justify-between">
            <div class="font-syne font-bold text-lime-400 text-sm tracking-widest uppercase flex items-center gap-2">
                <span class="w-2 h-2 bg-lime-400 rounded-full animate-pulse"></span>RDK Dashboard
            </div>
            <div class="flex items-center gap-4">
                <button id="btn-sync" onclick="triggerSync()" class="text-xs font-syne font-bold bg-white/5 border border-white/10 px-4 py-2 rounded-lg hover:bg-lime-400 hover:text-dark-900 transition-all">
                    Sincronizar Bling
                </button>
                <button onclick="doLogout()" class="text-xs text-white/40 hover:text-red-400 transition-colors">Sair</button>
            </div>
        </nav>

        <main class="p-6 max-w-5xl mx-auto w-full space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-dark-800 border border-white/5 p-6 rounded-2xl">
                    <p class="text-[10px] text-white/40 uppercase tracking-widest mb-2">Faturamento Geral</p>
                    <h2 id="fat-total" class="text-4xl font-syne font-extrabold text-lime-400">R$ 0,00</h2>
                </div>
                <div class="bg-dark-800 border border-white/5 p-6 rounded-2xl">
                    <p class="text-[10px] text-white/40 uppercase tracking-widest mb-2">Meta R$ 100.000</p>
                    <div class="w-full bg-white/5 h-4 rounded-full mt-4 overflow-hidden border border-white/5">
                        <div id="meta-bar" class="bg-lime-400 h-full progress-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-dark-800 border border-white/5 rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase text-white/40 font-bold tracking-widest">
                        <tr>
                            <th class="px-6 py-4">Afiliado</th>
                            <th class="px-6 py-4 text-right">Vendas Totais</th>
                        </tr>
                    </thead>
                    <tbody id="lista-afiliados" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
